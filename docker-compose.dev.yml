services:
  api:
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app",
      ]
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app

  scheduler:
    command: ["watchfiles", "python -m app.jobs loop", "/app/app"]
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app

  web:
    build:
      context: ./frontend
      target: development
    command:
      [
        "sh",
        "-c",
        "CI=true pnpm install --frozen-lockfile && pnpm dev --webpack --hostname 0.0.0.0",
      ]
    environment:
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next

volumes:
  frontend-node-modules:
  frontend-next-cache:
