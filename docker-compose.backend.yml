name: event-manager-backend

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-backend: &backend
  image: event-manager-backend:latest
  build:
    context: ./backend
  environment:
    DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
    APP_SECRET_KEY: ${APP_SECRET_KEY:?Set APP_SECRET_KEY}
    PUBLIC_APP_URL: ${PUBLIC_APP_URL:?Set PUBLIC_APP_URL}
    COOKIE_SECURE: ${COOKIE_SECURE:-true}
    ADMIN_SESSION_HOURS: ${ADMIN_SESSION_HOURS:-12}
    VENDOR_SESSION_IDLE_MINUTES: ${VENDOR_SESSION_IDLE_MINUTES:-30}
    PENDING_PAYMENT_MINUTES: ${PENDING_PAYMENT_MINUTES:-5}
    ADMIN_WALLET_PREVIEW_MINUTES: ${ADMIN_WALLET_PREVIEW_MINUTES:-5}
    ENVIRONMENT: ${ENVIRONMENT:-production}
    SMTP_HOST: ${SMTP_HOST:-}
    SMTP_PORT: ${SMTP_PORT:-587}
    SMTP_USERNAME: ${SMTP_USERNAME:-}
    SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@example.com}
    SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Event Manager}
    SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
    SMTP_SSL: ${SMTP_SSL:-false}
    SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-20}
    EMAIL_TEST_RECIPIENT: ${EMAIL_TEST_RECIPIENT:-}
    DEVELOPMENT_EMAIL_DELIVERY_LIMIT: ${DEVELOPMENT_EMAIL_DELIVERY_LIMIT:-3}
  logging: *default-logging
  networks:
    - database

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Set MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:?Set MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=128M
      - --innodb-log-buffer-size=8M
      - --max-connections=30
      - --table-open-cache=200
      - --performance-schema=OFF
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s
    logging: *default-logging
    networks:
      - database

  migrate:
    <<: *backend
    restart: "no"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      mysql:
        condition: service_healthy

  api:
    <<: *backend
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - application
      - database
      - outbound

  scheduler:
    <<: *backend
    restart: unless-stopped
    command: ["python", "-m", "app.jobs", "loop"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - database
      - outbound

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    command:
      - caddy
      - reverse-proxy
      - --from
      - ${CADDY_ADDRESS:?Set CADDY_ADDRESS}
      - --to
      - api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    logging: *default-logging
    networks:
      - edge
      - application

volumes:
  mysql-data:
  caddy-data:
  caddy-config:

networks:
  edge:
  application:
    internal: true
  database:
    internal: true
  outbound:
